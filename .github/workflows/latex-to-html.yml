name: Convert LaTeX to HTML

on: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out GitHub repository
      - name: Checkout GitHub repository
        uses: actions/checkout@v2
        with:
          ref: main  # Always checkout the main branch
          fetch-depth: 0  # Fetch the full history to avoid shallow clone issues

      # Step 2: Set up Git for GitHub authentication
      - name: Set up Git for GitHub
        run: |
          git config user.name "GitHub Action"
      
      #  Step 3: Install Pandoc
      - name: Set up Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc 
      # Pandoc reads cv.tex from public/ (where it lives so VitePress copies
      # it through as a static asset) and writes a plain-HTML fallback to
      # public/cv-print.html, which is also served as a static asset.
      # cv.html (the styled portfolio CV) is NEVER overwritten.
      - name: Convert LaTeX to HTML
        run: pandoc public/cv.tex -o public/cv-print.html

      - name: Commit and push changes
        env:
          TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git add public/cv-print.html || true
          git diff --cached --quiet || (git commit -m "Update plain-HTML CV from LaTeX" && git push)
